  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCxgOPkeF2aFLT5AfYKfcnXAQ_HYgp84R0",
      authDomain: "daily-loom-trista.firebaseapp.com",
      projectId: "daily-loom-trista",
      storageBucket: "daily-loom-trista.firebasestorage.app",
      messagingSenderId: "331723647052",
      appId: "1:331723647052:web:fcc4de9afe76a358882ce9"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const REF = doc(db, "users", "trista");

    window.fbLoad = async () => {
      try {
        const snap = await getDoc(REF);
        return snap.exists() ? snap.data() : null;
      } catch(e) { console.error("fbLoad error", e); return null; }
    };

    let saveTimer = null;
    window.fbSave = (data) => {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        try { await setDoc(REF, data); }
        catch(e) { console.error("fbSave error", e); }
      }, 2000);
    };

    window.fbReady = true;
    window.dispatchEvent(new Event("fbReady"));
  </script>

  <script>
const {
  useState,
  useEffect,
  useCallback
} = React;
const CAT_COLOR = {
  gov: "#1F2A44",
  local: "#8B5E3C",
  other: "#4A6080"
};
const CAT_BG = {
  gov: "#DDD5C4",
  local: "#EDD9C4",
  other: "#D5DFF0"
};
const CAT_LABEL = {
  gov: "市政府",
  local: "地區類",
  other: "其他類"
};
const DAYS_ZH = ["日", "一", "二", "三", "四", "五", "六"];
const TODAY = new Date();
const TODAY_STR = `${TODAY.getMonth() + 1}/${TODAY.getDate()}`;
const ROUTINE = {
  sport: {
    label: "運動",
    color: "#4A6080",
    bg: "#D5DFF0"
  },
  koto: {
    label: "古箏",
    color: "#7A6251",
    bg: "#E8DABB"
  },
  translate: {
    label: "翻譯",
    color: "#2A4060",
    bg: "#E8E2D2"
  },
  material: {
    label: "教材",
    color: "#6B6558",
    bg: "#E8E0CC"
  },
  buffer: {
    label: "緩衝",
    color: "#8C8880",
    bg: "#F2ECE0"
  }
};
const TIME_SLOTS = ["08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00"];

//  helpers 
const daysUntil = md => {
  const [m, d] = md.split("/").map(Number);
  return Math.ceil((new Date(TODAY.getFullYear(), m - 1, d) - TODAY) / 864e5);
};
const toWeek = md => {
  if (!md) return "";
  const [m, d] = md.split("/").map(Number);
  return DAYS_ZH[new Date(TODAY.getFullYear(), m - 1, d).getDay()];
};
const getWeekDates = (off = 0) => {
  const b = new Date(TODAY);
  b.setDate(b.getDate() + off * 7);
  const dow = b.getDay();
  b.setDate(b.getDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({
    length: 7
  }, (_, i) => {
    const d = new Date(b);
    d.setDate(b.getDate() + i);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  });
};
const routineBlocks = (dt, teaches) => {
  const [m, d] = dt.split("/").map(Number),
    dow = new Date(TODAY.getFullYear(), m - 1, d).getDay();
  if (dow < 1 || dow > 5) return [];
  const morn = teaches.some(t => t.time < "12:"),
    aft = teaches.some(t => t.time >= "12:");
  const b = [];
  if (morn) {
    b.push({
      type: "koto",
      time: "13:00~14:00"
    });
    if (!aft) b.push({
      type: "translate",
      time: "14:00~16:00"
    });
  } else {
    b.push({
      type: "sport",
      time: "08:30~10:00"
    }, {
      type: "translate",
      time: "10:00~12:00"
    }, {
      type: "koto",
      time: "13:00~14:00"
    });

//  Month View 
function calcHrs(timeStr) {
  if (!timeStr) return 0;
  const [s, e] = timeStr.split("~");
  if (!s || !e) return 0;
  const toMin = t => {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + (m || 0);
  };
