// ── App ───────────────────────────────────────────────────
function App() {
  const [courses,   setCourses]   = useState(INIT_COURSES);
  const [monthlyPaid, setMonthlyPaid] = useState({}); // {"2026/5": {paid:true, paidDate:"5/31", bank:"..."} }
  const [tasks,     setTasks]     = useState(()=>[...INIT_TASKS,...genTeachTasks(INIT_COURSES)]);
  const [freeTasks, setFreeTasks] = useState([]);
  const [calEvents, setCalEvents] = useState([]);
  const [view,      setView]      = useState("home");
  const [weekOff,   setWeekOff]   = useState(0);
  const [selMonth,  setSelMonth]  = useState("6");
  const [expCourse, setExpCourse] = useState(null);
  const [todoInput, setTodoInput] = useState({});
  const [nextId,    setNextId]    = useState(300);
  const [toast,     setToast]     = useState(null);
  const [syncing,   setSyncing]   = useState(false);
  // home filter
  const [homeTab,   setHomeTab]   = useState("tasks");
  // 翻譯清單（作品集 + 進行中）
  const [translates, setTranslates] = useState(()=>{
    // 作品集基底
    const base = INIT_TRANSLATES.map(t=>({...t,
      deadline:"", fee:"", feeBank:"", feeDate:"", feePaid:false, feePaidDate:"", pubNote:t.note||"",
    }));
    // 把 INIT_TASKS 的帳務資料對應到進行中的案子（非 archived）
    const taskMap = {};
    INIT_TASKS.filter(t=>t.type==="translate").forEach(t=>{
      taskMap[t.id]={deadline:t.deadline||"",fee:t.fee||"",feeBank:t.feeBank||"",feeDate:t.feeDate||"",feePaid:t.feePaid||false,feePaidDate:t.feePaidDate||""};
    });
    return base;
  });
  // modals
  const [logModal,       setLogModal]       = useState(null);
  const [courseModal,    setCourseModal]    = useState(null); // {mode:"add"|"edit", data?}
  const [courseForm,     setCourseForm]     = useState(EMPTY_COURSE);
  const [taskModal,      setTaskModal]      = useState(false);
  const [taskForm,       setTaskForm]       = useState(EMPTY_TASK);
  const [calModal,       setCalModal]       = useState(null);
  const [calForm,        setCalForm]        = useState(EMPTY_CAL);
  const [paidModal,      setPaidModal]      = useState(null);
  const [paidDateInput,  setPaidDateInput]  = useState("");
  const [transTab,       setTransTab]       = useState("active");
  const [transModal,     setTransModal]     = useState(null);
  const [transForm,      setTransForm]      = useState({publisher:"",title:"",deadline:"",note:"",fee:"",feeBank:"",feeDate:"",pubDate:"",pubNote:""});
  const [confirmDelete,  setConfirmDelete]  = useState(false);
  const [freeInput,      setFreeInput]      = useState("");

  // ── Persist ──
  useEffect(()=>{
    const load = async () => {
      try {
        // 優先從 Firebase 載入，fallback 到 localStorage
        let p = null;
        if (window.fbReady) {
          p = await window.fbLoad();
        } else {
          await new Promise(res => window.addEventListener("fbReady", res, {once:true}));
          p = await window.fbLoad();
        }
        // 如果 Firebase 沒資料，試試 localStorage
        if (!p) {
          const raw = localStorage.getItem("slashV5");
          if (raw) p = JSON.parse(raw);
        }
        if (p) {
          if (p.courses?.length)    setCourses(p.courses);
          if (p.tasks?.length)      setTasks(p.tasks);
          if (p.freeTasks)          setFreeTasks(p.freeTasks);
          if (p.nextId)             setNextId(p.nextId);
          if (p.monthlyPaid)        setMonthlyPaid(p.monthlyPaid);
          if (p.translates?.length) setTranslates(p.translates);
          if (p.calEvents?.length)  setCalEvents(p.calEvents);
        }
      } catch(e){ console.error("load error", e); }
    };
    load();
  },[]);

  const persist = useCallback((c,t,f,ce,nid,mp,tr)=>{
    setSyncing(true);
    const data = {courses:c, tasks:t, freeTasks:f, calEvents:ce, nextId:nid, monthlyPaid:mp||{}, translates:tr!==undefined?tr:translates};
    if (window.fbSave) window.fbSave(data);
    try { localStorage.setItem("slashV5", JSON.stringify(data)); } catch(e){}
    setTimeout(()=>setSyncing(false),400);
  },[translates]);

  // translates 變動時也寫入（移除，改由 persist 統一處理，避免覆蓋 monthlyPaid）
  const toast2 = (msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2000);};

  // ── Course CRUD ──
  const openAddCourse = () => { setCourseForm(EMPTY_COURSE); setCourseModal({mode:"add"}); };
  const openEditCourse = c => { setCourseForm({...c,assistants:(c.assistants||[]).join("、"),note:c.note||"",fee:c.fee||"",feeBank:c.feeBank||"",feeDate:c.feeDate||"",feePaid:c.feePaid||false}); setCourseModal({mode:"edit",id:c.id}); };
  const saveCourse = () => {
    const aList = (courseForm.assistants||"").split(/[、,，\s]+/).map(s=>s.trim()).filter(Boolean);
    if (!courseForm.date||!courseForm.location){toast2("請填日期和地點","err");return;}
    if (courseModal.mode==="add") {
      const nc = {...courseForm,id:nextId,assistants:aList,todos:[],note:courseForm.note||"",fee:courseForm.fee||"",feeBank:courseForm.feeBank||"",feeDate:courseForm.feeDate||"",feePaid:false};
      const upd=[...courses,nc], nid=nextId+1;
      // auto-gen teaching task
      const newTask=genTeachTasks([nc])[0];
      const tupd=[...tasks,newTask];
      setCourses(upd);setTasks(tupd);setNextId(nid);persist(upd,tupd,freeTasks,calEvents,nid,monthlyPaid);
    } else {
      const upd=courses.map(c=>c.id!==courseModal.id?c:{...c,...courseForm,assistants:aList});
      setCourses(upd);persist(upd,tasks,freeTasks,calEvents,nextId,monthlyPaid);
    }
    toast2(courseModal.mode==="add"?"已新增課程 ✓":"已儲存 ✓");
    setCourseModal(null);
  };
  const deleteCourse = id => {
    const upd=courses.filter(c=>c.id!==id);
    const tupd=tasks.filter(t=>t.courseId!==id);
    setCourses(upd);setTasks(tupd);persist(upd,tupd,freeTasks,calEvents,nextId);
    setCourseModal(null);toast2("已刪除","err");
  };

  // ── Task CRUD ──
  const addTask = () => {
    if (!taskForm.name||!taskForm.deadline){toast2("請填名稱和截止日","err");return;}
    const t={id:`w${nextId}`,type:taskForm.type,name:taskForm.name,deadline:taskForm.deadline,
      segments:10,done:0,logs:[],todos:[],
      fee:taskForm.fee||"",feeBank:taskForm.feeBank||"",feeDate:taskForm.feeDate||"",feePaid:false,
      color:taskForm.type==="translate"?"#2A4060":"#6B6558",
      bg:taskForm.type==="translate"?"#E8E2D2":taskForm.type==="other"?"#D5DFF0":"#E8E0CC"};
    const upd=[...tasks,t],nid=nextId+1;
    setTasks(upd);setNextId(nid);persist(courses,upd,freeTasks,calEvents,nid,monthlyPaid);
    setTaskModal(false);setTaskForm(EMPTY_TASK);toast2("已新增任務 ✓");
  };
  const delTask = id => {
    const upd=tasks.filter(t=>t.id!==id);setTasks(upd);persist(courses,upd,freeTasks,calEvents,nextId,monthlyPaid);toast2("已刪除","err");
  };
  const logWork = (taskId,units,date,slotType) => {
    const upd=tasks.map(t=>t.id!==taskId?t:{...t,done:Math.min(10,t.done+units),logs:[...(t.logs||[]),{id:Date.now(),date,units,slotType}]});
    setTasks(upd);persist(courses,upd,freeTasks,calEvents,nextId,monthlyPaid);toast2(`+${units} 等分 ✓`);
  };

  // ── Free tasks ──
  const addFree = () => {
    if (!freeInput.trim()) return;
    const upd=[...freeTasks,{id:Date.now(),text:freeInput.trim(),done:false,segments:10,progress:0,logs:[]}];
    setFreeTasks(upd);persist(courses,tasks,upd,calEvents,nextId,monthlyPaid);setFreeInput("");
  };
  const togFree = id=>{const upd=freeTasks.map(t=>t.id===id?{...t,done:!t.done}:t);setFreeTasks(upd);persist(courses,tasks,upd,calEvents,nextId,monthlyPaid);};
  const delFree = id=>{const upd=freeTasks.filter(t=>t.id!==id);setFreeTasks(upd);persist(courses,tasks,upd,calEvents,nextId,monthlyPaid);};
  const logFreeWork = (id,units)=>{
    const upd=freeTasks.map(t=>t.id!==id?t:{...t,progress:Math.min(10,(t.progress||0)+units),logs:[...(t.logs||[]),{id:Date.now(),date:TODAY_STR,units}]});
    setFreeTasks(upd);persist(courses,tasks,upd,calEvents,nextId,monthlyPaid);toast2(`+${units} 等分 ✓`);
  };

  // ── Todos ──
  const addTodo = cid=>{
    const text=(todoInput[cid]||"").trim();if(!text)return;
    const upd=courses.map(c=>c.id===cid?{...c,todos:[...(c.todos||[]),{id:Date.now(),text,done:false}]}:c);
    setCourses(upd);setTodoInput(p=>({...p,[cid]:""}));persist(upd,tasks,freeTasks,calEvents,nextId,monthlyPaid);
  };
  const toggleTodo=(cid,tid)=>{const upd=courses.map(c=>c.id===cid?{...c,todos:(c.todos||[]).map(t=>t.id===tid?{...t,done:!t.done}:t)}:c);setCourses(upd);persist(upd,tasks,freeTasks,calEvents,nextId,monthlyPaid);};
  const delTodo=(cid,tid)=>{const upd=courses.map(c=>c.id===cid?{...c,todos:(c.todos||[]).filter(t=>t.id!==tid)}:c);setCourses(upd);persist(upd,tasks,freeTasks,calEvents,nextId,monthlyPaid);};

  // ── Cal events ──
  const addCalEvent = () => {
    const mode=calForm.mode||"free";
    if (mode==="free"&&!calForm.title){toast2("請填內容","err");return;}
    if ((mode==="translate"||mode==="material"||mode==="other")&&!calForm.taskId){toast2("請選擇任務","err");return;}
    const task=activeTasks.find(t=>t.id===calForm.taskId);
    const title=mode==="free"?calForm.title:mode==="translate"?"翻譯":mode==="material"?"教材":"其他";
    if (calModal?.editId) {
      const upd=calEvents.map(e=>e.id!==calModal.editId?e:{...e,title,taskType:mode,taskId:calForm.taskId||"",taskName:task?.name||"",time:calForm.time||"",note:calForm.note||""});
      setCalEvents(upd);persist(courses,tasks,freeTasks,upd,nextId,monthlyPaid);
      toast2("已更新 ✓");
    } else {
      const ev={id:Date.now(),date:calModal.date,time:calForm.time||calModal.slotTime||"",
        title,taskType:mode,taskId:calForm.taskId||"",taskName:task?.name||"",done:false,note:calForm.note||""};
      const upd=[...calEvents,ev];
      setCalEvents(upd);persist(courses,tasks,freeTasks,upd,nextId,monthlyPaid);
      toast2("已新增 ✓");
    }
    setCalModal(null);setCalForm(EMPTY_CAL);
  };
  const delCalEvent = id=>{const upd=calEvents.filter(e=>e.id!==id);setCalEvents(upd);persist(courses,tasks,freeTasks,upd,nextId,monthlyPaid);};
  const togCalEvent = id=>{const upd=calEvents.map(e=>e.id===id?{...e,done:!e.done}:e);setCalEvents(upd);persist(courses,tasks,freeTasks,upd,nextId,monthlyPaid);};

  const saveTranslate = () => {
    if (!transForm.title){toast2("請填書名","err");return;}
    if (transModal?.mode==="add") {
      const nid = nextId;
      const nt={id:`tr${nid}`,...transForm,feePaid:false,feePaidDate:"",archived:false};
      const newTask={
        id:`tw${nid}`, type:"translate",
        name:`[${transForm.publisher||"翻譯"}] ${transForm.title}`,
        deadline:transForm.deadline,
        segments:10, done:0, logs:[], todos:[],
        fee:transForm.fee||"", feeBank:transForm.feeBank||"",
        feeDate:transForm.feeDate||"", feePaid:false,
        color:"#2A4060", bg:"#E8E2D2",
      };
      const tupd=[...tasks,newTask];
      const newTranslates=[...translates,nt];
      setTranslates(newTranslates);
      setTasks(tupd);
      setNextId(nid+1);
      persist(courses,tupd,freeTasks,calEvents,nid+1,monthlyPaid,newTranslates);
    } else {
      // task_ 前綴：來自 INIT_TASKS（不在 translates 裡），只更新 tasks
      if(transModal.id?.startsWith("task_")){
        const rawTaskId=transModal.id.replace("task_","");
        const tupd=tasks.map(t=>t.id!==rawTaskId?t:{...t,
          name:`[${transForm.publisher||"翻譯"}] ${transForm.title}`,
          deadline:transForm.deadline,
          fee:transForm.fee||"",feeBank:transForm.feeBank||"",feeDate:transForm.feeDate||"",
        });
        setTasks(tupd);
        persist(courses,tupd,freeTasks,calEvents,nextId,monthlyPaid);
      } else {
        const upd=translates.map(t=>t.id!==transModal.id?t:{...t,...transForm});
        setTranslates(upd);
        // 同步更新 tasks 裡對應的翻譯任務
        const tId=`tw${transModal.id.replace("tr","")}`;
        const tupd=tasks.map(t=>t.id!==tId?t:{...t,
          name:`[${transForm.publisher||"翻譯"}] ${transForm.title}`,
          deadline:transForm.deadline,
          fee:transForm.fee||"",feeBank:transForm.feeBank||"",feeDate:transForm.feeDate||"",
        });
        setTasks(tupd);
        persist(courses,tupd,freeTasks,calEvents,nextId,monthlyPaid,upd);
      }
    }
    setTransModal(null); toast2("已儲存 ✓");
  };
  const archiveTrans = (id, mode) => {
    const unarchive = mode==="unarchive";
    const upd=translates.map(t=>t.id!==id?t:{...t,archived:!unarchive});
    setTranslates(upd);
    persist(courses,tasks,freeTasks,calEvents,nextId,monthlyPaid,upd);
    toast2(unarchive?"已移回進行中":"已移至作品集");
    if(unarchive) setTransTab("active");
  };
  const deleteTrans = id => {
    if (id?.startsWith("task_")) {
      const rawId = id.replace("task_","");
      const tupd = tasks.filter(t=>t.id!==rawId);
      setTasks(tupd); persist(courses,tupd,freeTasks,calEvents,nextId,monthlyPaid);
    } else {
      const upd = translates.filter(t=>t.id!==id);
      setTranslates(upd);
      // 同步刪除 tasks 裡對應的 tw 項目
      const tId = `tw${id.replace("tr","")}`;
      const tupd = tasks.filter(t=>t.id!==tId);
      setTasks(tupd); persist(courses,tupd,freeTasks,calEvents,nextId,monthlyPaid);
    }
    toast2("已刪除","err");
  };
  const saveCourseFee = (id, fee) => {
    const upd=courses.map(c=>c.id!==id?c:{...c,fee});
    setCourses(upd);persist(upd,tasks,freeTasks,calEvents,nextId,monthlyPaid);
  };
  const toggleMonthPaid = (monthKey, paidDate, paidAmt) => {
    const cur = monthlyPaid[monthKey];
    const upd = {...monthlyPaid, [monthKey]: cur?.paid ? {paid:false,paidDate:"",paidAmt:""} : {paid:true,paidDate:paidDate||"",paidAmt:paidAmt||""}};
    setMonthlyPaid(upd);
    persist(courses,tasks,freeTasks,calEvents,nextId,upd);
  };
  const toggleFeePaid = (id, paidDate) => {
    const upd=courses.map(c=>c.id!==id?c:{...c,feePaid:!c.feePaid,feePaidDate:paidDate||""});
    setCourses(upd);persist(upd,tasks,freeTasks,calEvents,nextId,monthlyPaid);
  };
  const toggleTaskFeePaid = (id, paidDate) => {
    const upd=tasks.map(t=>t.id!==id?t:{...t,feePaid:!t.feePaid,feePaidDate:paidDate||""});
    setTasks(upd);persist(courses,upd,freeTasks,calEvents,nextId,monthlyPaid);
  };
  const addTaskTodo=(taskId,text)=>{
    const upd=tasks.map(t=>t.id!==taskId?t:{...t,todos:[...(t.todos||[]),{id:Date.now(),text,done:false}]});
    setTasks(upd);persist(courses,upd,freeTasks,calEvents,nextId,monthlyPaid);
  };
  const toggleTaskTodo=(taskId,todoId)=>{
    const upd=tasks.map(t=>t.id!==taskId?t:{...t,todos:(t.todos||[]).map(td=>td.id===todoId?{...td,done:!td.done}:td)});
    setTasks(upd);persist(courses,upd,freeTasks,calEvents,nextId,monthlyPaid);
  };
  const delTaskTodo=(taskId,todoId)=>{
    const upd=tasks.map(t=>t.id!==taskId?t:{...t,todos:(t.todos||[]).filter(td=>td.id!==todoId)});
    setTasks(upd);persist(courses,upd,freeTasks,calEvents,nextId,monthlyPaid);
  };

  const weekDates    = getWeekDates(weekOff);
  const activeTasks  = tasks.filter(t=>t.done<10);
  const allMonths    = [...new Set(courses.map(c=>c.date.split("/")[0]))].sort((a,b)=>+a-+b);
  const pendingTodos = courses.flatMap(c=>(c.todos||[]).filter(t=>!t.done).map(t=>({...t,cid:c.id,cloc:c.location,cdate:c.date})));
  const pendingFree  = freeTasks.filter(t=>!t.done);
  // all items for gantt sorted by deadline asc (no deadline goes last)
  const allGanttItems = [
    ...activeTasks.map(t=>({...t,isFree:false})),
    ...freeTasks.filter(f=>!f.done).map(f=>({id:f.id,name:f.text,type:"todo",deadline:null,done:f.progress||0,color:"#8B5CF6",bg:"#EDE9FE",logs:f.logs||[],isFree:true})),
  ].sort((a,b)=>{
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return daysUntil(a.deadline) - daysUntil(b.deadline);
  });

  return (
    <div style={{fontFamily:"'Noto Sans TC',sans-serif",background:"#EDE5D4",minHeight:"100vh",paddingBottom:80}}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Raleway:wght@300;400;700&display=swap" rel="stylesheet"/>
      {toast&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:999,background:toast.type==="err"?"#c0392b":"#111",color:"#fff",padding:"9px 20px",borderRadius:24,fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{toast.msg}</div>}
      {syncing&&<div style={{position:"fixed",bottom:18,right:14,zIndex:400,background:"#1F2A44",color:"#DDD5C4",borderRadius:20,padding:"5px 12px",fontSize:11}}>☁️ 同步…</div>}

      {/* Header */}
      <div style={{background:"#1F2A44",color:"#F0EAE0",padding:"18px 16px 14px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#C6A75E",marginBottom:5,fontWeight:500,textTransform:"uppercase"}}>A SOFTER WAY TO MANAGE LIFE</div>
        <div style={{fontFamily:"'Raleway',sans-serif",fontWeight:300,fontSize:22,letterSpacing:"6px",lineHeight:1.1,color:"#FDFAF5",textTransform:"uppercase"}}>DAILY LOOM · TRISTA</div>
        <div style={{marginTop:12,display:"flex",gap:5,flexWrap:"wrap"}}>
          {[["week","☽ 行事曆"],["home","◎ 工作"],["month","⊞ 課表"],["trans","⟐ 翻譯"],["finance","◈ 財務"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,letterSpacing:".5px",fontFamily:"inherit",
              background:view===v?"#C6A75E":"rgba(255,255,255,.1)",
              color:view===v?"#1F2A44":"#E8DFC8",
              transition:"background .2s,color .2s"}}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"10px 12px"}}>

        {/* ── HOME ── */}
        {view==="home"&&(
          <div>
            {/* Filter tabs */}
            <div style={{display:"flex",gap:5,marginBottom:10,background:"#FDFAF5",borderRadius:12,padding:"6px",boxShadow:"0 1px 4px rgba(73,78,81,.07)"}}>
              {[["tasks","▸ 進行中任務"],["todos","↳ 隨手代辦"],["courses","⊞ 近期課程"]].map(([k,l])=>(
                <button key={k} onClick={()=>setHomeTab(k)} style={{flex:1,padding:"6px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,letterSpacing:".3px",
                  background:homeTab===k?"#1F2A44":"transparent",color:homeTab===k?"#F0EAE0":"#8A9BB5",fontFamily:"inherit",transition:"background .2s,color .2s"}}>{l}</button>
              ))}
            </div>

            {/* Tasks panel */}
            {homeTab==="tasks"&&(
              <div>
                {allGanttItems.length===0&&<div style={{textAlign:"center",padding:"30px",color:"#ccc",fontSize:12}}>沒有進行中的工作</div>}

                {/* 翻譯區塊 */}
                {(()=>{
                  const items=allGanttItems.filter(t=>t.type==="translate");
                  if(!items.length) return null;
                  return (
                    <div style={{marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",color:"#2A4060",textTransform:"uppercase"}}>⟐ 翻譯</span>
                        <span style={{fontSize:10,color:"#8A9BB5"}}>{items.length} 件</span>
                        <div style={{flex:1,height:"1px",background:"#E8E2D2"}}/>
                      </div>
                      {items.map(t=>(
                        <MiniGanttRow key={t.id} task={t}
                          onInc={()=>logWork(t.id,1,TODAY_STR,"manual")}
                          onDec={()=>setTasks(prev=>{const u=prev.map(tk=>tk.id!==t.id?tk:{...tk,done:Math.max(0,tk.done-1)});persist(courses,u,freeTasks,calEvents,nextId,monthlyPaid);return u;})}
                          onDel={()=>delTask(t.id)}
                          onAddTodo={addTaskTodo} onToggleTodo={toggleTaskTodo} onDelTodo={delTaskTodo}
                        />
                      ))}
                    </div>
                  );
                })()}

                {/* 授課備課區塊 */}
                {(()=>{
                  const items=allGanttItems.filter(t=>t.type==="teach"||t.type==="material");
                  if(!items.length) return null;
                  return (
                    <div style={{marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",color:"#6B6558",textTransform:"uppercase"}}>⊞ 備課</span>
                        <span style={{fontSize:10,color:"#8A9BB5"}}>{items.length} 件</span>
                        <div style={{flex:1,height:"1px",background:"#E8E0CC"}}/>
                      </div>
                      {items.map(t=>(
                        <MiniGanttRow key={t.id} task={t}
                          onInc={()=>logWork(t.id,1,TODAY_STR,"manual")}
                          onDec={()=>setTasks(prev=>{const u=prev.map(tk=>tk.id!==t.id?tk:{...tk,done:Math.max(0,tk.done-1)});persist(courses,u,freeTasks,calEvents,nextId,monthlyPaid);return u;})}
                          onDel={()=>delTask(t.id)}
                          onAddTodo={addTaskTodo} onToggleTodo={toggleTaskTodo} onDelTodo={delTaskTodo}
                        />
                      ))}
                    </div>
                  );
                })()}

                {/* 其他 / 待辦區塊 */}
                {(()=>{
                  const items=allGanttItems.filter(t=>t.type!=="translate"&&t.type!=="teach"&&t.type!=="material");
                  if(!items.length) return null;
                  return (
                    <div style={{marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",color:"#4A6080",textTransform:"uppercase"}}>◎ 其他</span>
                        <span style={{fontSize:10,color:"#8A9BB5"}}>{items.length} 件</span>
                        <div style={{flex:1,height:"1px",background:"#D5DFF0"}}/>
                      </div>
                      {items.map(t=>(
                        <MiniGanttRow key={t.id} task={t}
                          onInc={()=>t.isFree?logFreeWork(t.id,1):logWork(t.id,1,TODAY_STR,"manual")}
                          onDec={()=>t.isFree
                            ? setFreeTasks(prev=>{const u=prev.map(f=>f.id!==t.id?f:{...f,progress:Math.max(0,(f.progress||0)-1)});persist(courses,tasks,u,calEvents,nextId,monthlyPaid);return u;})
                            : setTasks(prev=>{const u=prev.map(tk=>tk.id!==t.id?tk:{...tk,done:Math.max(0,tk.done-1)});persist(courses,u,freeTasks,calEvents,nextId,monthlyPaid);return u;})
                          }
                          onDel={()=>t.isFree?delFree(t.id):delTask(t.id)}
                          onAddTodo={addTaskTodo} onToggleTodo={toggleTaskTodo} onDelTodo={delTaskTodo}
                        />
                      ))}
                    </div>
                  );
                })()}

                <DoneTaskList tasks={tasks} freeTasks={freeTasks} delTask={delTask} delFree={delFree}
                  setTasks={setTasks} setFreeTasks={setFreeTasks} courses={courses} calEvents={calEvents} nextId={nextId} persist={persist}
                  toggleTaskFeePaid={toggleTaskFeePaid}
                  onMarkPaid={t=>{setPaidDateInput(t.feePaidDate||"");setPaidModal({type:"task",id:t.id,name:t.name,currentPaid:t.feePaid});}}/>
              </div>
            )}

            {/* Todos panel */}
            {homeTab==="todos"&&(
              <div>
                <div style={{background:"#FDFAF5",borderRadius:10,padding:"10px",marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>◎ 快速新增</div>
                  <div style={{display:"flex",gap:6}}>
                    <input value={freeInput} onChange={e=>setFreeInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addFree()} placeholder="任何事都可以丟進來…" style={{...iStyle,flex:1}}/>
                    <button onClick={addFree} style={btnS()}>+</button>
                  </div>
                </div>
                {pendingFree.map(t=>(
                  <div key={t.id} style={{background:"#FDFAF5",borderRadius:8,padding:"8px 10px",marginBottom:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:(t.progress||0)>0?4:0}}>
                      <Chk done={t.done} onToggle={()=>togFree(t.id)}/>
                      <span style={{flex:1,fontSize:12}}>{t.text}</span>
                      <button onClick={()=>{if((t.progress||0)>0)setFreeTasks(prev=>{const u=prev.map(f=>f.id!==t.id?f:{...f,progress:Math.max(0,(f.progress||0)-1)});persist(courses,tasks,u,calEvents,nextId,monthlyPaid);return u;});}} disabled={(t.progress||0)<=0} style={{width:24,height:24,borderRadius:5,border:`1.5px solid ${(t.progress||0)<=0?"#eee":"#8B5CF6"}`,background:"#FDFAF5",color:(t.progress||0)<=0?"#ddd":"#8B5CF6",fontSize:13,fontWeight:700,cursor:(t.progress||0)<=0?"default":"pointer",fontFamily:"inherit",padding:0,lineHeight:1}}>－</button>
                      <button onClick={()=>{if((t.progress||0)<10)setFreeTasks(prev=>{const u=prev.map(f=>f.id!==t.id?f:{...f,progress:Math.min(10,(f.progress||0)+1),logs:[...(f.logs||[]),{id:Date.now(),date:TODAY_STR,units:1}]});persist(courses,tasks,u,calEvents,nextId,monthlyPaid);return u;});}} disabled={(t.progress||0)>=10} style={{width:24,height:24,borderRadius:5,border:`1.5px solid ${(t.progress||0)>=10?"#eee":"#8B5CF6"}`,background:"#FDFAF5",color:(t.progress||0)>=10?"#ddd":"#8B5CF6",fontSize:13,fontWeight:700,cursor:(t.progress||0)>=10?"default":"pointer",fontFamily:"inherit",padding:0,lineHeight:1}}>＋</button>
                      <button onClick={()=>delFree(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:12,padding:0,fontFamily:"inherit"}}>✕</button>
                    </div>
                    {(t.progress||0)>0&&(
                      <div style={{display:"flex",gap:1,paddingLeft:23}}>
                        {Array.from({length:10},(_,i)=><div key={i} style={{flex:1,height:5,borderRadius:1,background:i<(t.progress||0)?"#8B5CF6":"#f0f0f0",transition:"background .15s"}}/>)}
                      </div>
                    )}
                  </div>
                ))}
                {pendingTodos.slice(0,5).map(t=>(
                  <div key={t.id} style={{background:"#FDFAF5",borderRadius:8,padding:"8px 10px",marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
                    <Chk done={t.done} onToggle={()=>toggleTodo(t.cid,t.id)}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12}}>{t.text}</div>
                      <div style={{fontSize:9,color:"#bbb"}}>{t.cdate} {t.cloc}</div>
                    </div>
                    <button onClick={()=>delTodo(t.cid,t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:12,padding:0}}>✕</button>
                  </div>
                ))}
                {pendingTodos.length===0&&pendingFree.length===0&&<div style={{textAlign:"center",padding:"30px",color:"#ccc",fontSize:12}}>沒有待辦事項</div>}
              </div>
            )}

            {/* Courses panel */}
            {homeTab==="courses"&&(
              <div>
                {sortByDate(courses).filter(c=>daysUntil(c.date)>=-1).slice(0,6).map(c=>(
                  <div key={c.id}>
                    <CourseMiniCard c={c} expanded={expCourse===c.id} onClick={()=>setExpCourse(expCourse===c.id?null:c.id)} onEdit={()=>openEditCourse(c)}/>
                    {expCourse===c.id&&<CoursePanel c={c} onClose={()=>setExpCourse(null)} onEdit={()=>openEditCourse(c)} onMarkPaid={()=>{setPaidDateInput(c.feeDate||"");setPaidModal({type:"course",id:c.id,name:c.location,currentPaid:c.feePaid});}}/>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── WEEK ── */}
        {view==="week"&&(
          <WeekView weekDates={weekDates} weekOff={weekOff} setWeekOff={setWeekOff}
            courses={courses} tasks={tasks}
            expCourse={expCourse} setExpCourse={setExpCourse}
            onEditCourse={openEditCourse}
            onMarkPaid={c=>{setPaidDateInput(c.feeDate||"");setPaidModal({type:"course",id:c.id,name:c.location,currentPaid:c.feePaid});}}
            onEditTrans={t=>{
              const nameMatch=t.name.match(/^\[(.*?)\]\s*(.*)/);
              const titleStr=nameMatch?nameMatch[2]:t.name;
              const tr=translates.find(r=>r.title&&r.title===titleStr);
              if(tr){
                setTransForm({publisher:tr.publisher||"",title:tr.title,deadline:tr.deadline||"",note:tr.note||"",fee:tr.fee||"",feeBank:tr.feeBank||"",feeDate:tr.feeDate||"",pubDate:tr.pubDate||"",pubNote:tr.pubNote||""});
                setTransModal({mode:"edit",id:tr.id});
              } else {
                setTransForm({publisher:nameMatch?nameMatch[1]:"",title:titleStr,deadline:t.deadline||"",note:"",fee:t.fee||"",feeBank:t.feeBank||"",feeDate:t.feeDate||"",pubDate:"",pubNote:""});
                setTransModal({mode:"edit",id:`task_${t.id}`});
              }
            }}
          />
        )}

        {/* ── MONTH ── */}
        {view==="month"&&(
          <MonthView courses={courses} allMonths={allMonths} selMonth={selMonth} setSelMonth={setSelMonth}
            expCourse={expCourse} setExpCourse={setExpCourse}
            todoInput={todoInput} setTodoInput={setTodoInput}
            addTodo={addTodo} toggleTodo={toggleTodo} delTodo={delTodo}
            onEdit={openEditCourse} onAdd={openAddCourse}
          />
        )}

        {view==="finance"&&(
          <FinanceView courses={courses} tasks={tasks}
            toggleFeePaid={toggleFeePaid} toggleTaskFeePaid={toggleTaskFeePaid}
            onGoToCourse={id=>{setView("month");setExpCourse(id);const m=courses.find(c=>c.id===id)?.date?.split("/")[0];if(m)setSelMonth(m);}}
            onMarkPaid={r=>{setPaidDateInput(r.feePaidDate||"");setPaidModal({type:r.type,id:r.rawId,name:r.name,currentPaid:r.feePaid});}}
            onEditCourse={openEditCourse}
            monthlyPaid={monthlyPaid} toggleMonthPaid={toggleMonthPaid}
            onSaveCourseFee={saveCourseFee}
          />
        )}

        {view==="trans"&&(
          <TransView translates={translates} transTab={transTab} setTransTab={setTransTab}

// ── Week View ─────────────────────────────────────────────
function WeekView({weekDates,weekOff,setWeekOff,courses,tasks,expCourse,setExpCourse,onEditCourse,onMarkPaid,onEditTrans}) {
  const DAY_LABELS=["一","二","三","四","五","六","日"];
  const HOURS=["08","09","10","11","12","13","14","15","16","17"];
  const START_HR=8, TOTAL_HRS=HOURS.length;
  const [expTrans, setExpTrans] = React.useState(null);

  const parseHr = hhmm => {
    if (!hhmm) return null;
    const [h,m]=hhmm.split(":").map(Number);
    return (h + m/60) - START_HR;
  };
  const timeToGrid = timeStr => {
    if (!timeStr) return null;
    const [s,e]=timeStr.split("~");
    const start=parseHr(s), end=parseHr(e);
    if (start==null||end==null||start<0) return null;
    const rowStart=Math.floor(start)+1;
    const rowSpan=Math.max(1,Math.ceil(end-start));
    return {rowStart,rowSpan};
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
        <button onClick={()=>setWeekOff(w=>w-1)} style={navBtnS}>‹</button>
        <span style={{flex:1,textAlign:"center",fontSize:12,fontWeight:500,color:"#555"}}>
          {weekOff===0?"本週　":""}{weekDates[0]}–{weekDates[6]}
        </span>
        <button onClick={()=>setWeekOff(w=>w+1)} style={navBtnS}>›</button>
        {weekOff!==0&&<button onClick={()=>setWeekOff(0)} style={{...navBtnS,fontSize:11,padding:"3px 8px"}}>今</button>}
      </div>
      <div style={{overflowX:"auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"28px repeat(7,1fr)",gap:2,minWidth:360}}>
          <div/>
          {weekDates.map((dt,i)=>(
            <div key={dt} style={{textAlign:"center",padding:"4px 0",background:dt===TODAY_STR?"#1F2A44":i>=5?"#EAE3D3":"#FDFAF5",borderRadius:6,marginBottom:2}}>
              <div style={{fontSize:11,color:dt===TODAY_STR?"#8A9BB5":i>=5?"#aaa":"#aaa"}}>{DAY_LABELS[i]}</div>
              <div style={{fontSize:13,fontWeight:700,color:dt===TODAY_STR?"#8A9BB5":i>=5?"#4A6080":"#1F2A44"}}>{dt}</div>
            </div>
          ))}

          {/* Time label column */}
          <div style={{display:"grid",gridTemplateRows:`repeat(${TOTAL_HRS},42px)`,gap:2}}>
            {HOURS.map(hr=>(
              <div key={hr} style={{fontSize:10,color:"#bbb",textAlign:"right",paddingRight:3,paddingTop:4,lineHeight:1,height:42}}>{hr}</div>
            ))}
          </div>

          {/* Each day column */}
          {weekDates.map((dt,di)=>{
            const dayTeaches=courses.filter(c=>c.date===dt&&c.time);

            const normDate = s => {
              if (!s) return "";
              const parts = s.replace(/[（(].*/, "").trim().split("/").map(n=>+n);
              if (parts.length===3 && parts[0]>12) return `${parts[1]}/${parts[2]}`;  // YYYY/M/D → M/D（需年份比對）
              if (parts.length===3 && parts[0]<=12) return `${parts[0]}/${parts[1]}`; // M/D/? → M/D
              if (parts.length===2 && parts[0]>12) return "";   // YYYY/M 只到月，不顯示
              if (parts.length===2) return `${parts[0]}/${parts[1]}`; // M/D
              return "";
            };
            const normYear = s => {
              if (!s) return null;
              const parts = s.replace(/[（(].*/, "").trim().split("/").map(n=>+n);
              if (parts.length>=3 && parts[0]>12) return parts[0]; // YYYY/M/D
              return 2026; // 無年份資料，假設今年
            };
            const CUR_YEAR = 2026;
            const transDeadlines = tasks.filter(t=>t.type==="translate"&&normDate(t.deadline)===dt&&normYear(t.deadline)===CUR_YEAR);
            const transPaid      = tasks.filter(t=>t.type==="translate"&&t.feePaid&&normDate(t.feeDate)===dt&&normYear(t.feeDate)===CUR_YEAR);

            const occupiedHrs=new Set();
            dayTeaches.forEach(c=>{
              const g=timeToGrid(c.time);
              if(g) for(let r=g.rowStart;r<g.rowStart+g.rowSpan;r++) occupiedHrs.add(r);
            });

            return (
              <div key={dt} style={{
                display:"grid",
                gridTemplateRows:`repeat(${TOTAL_HRS},42px)`,
                gridTemplateColumns:"1fr",
                gap:2,
                position:"relative",
              }}>
                {HOURS.map((hr,hi)=>{
                  const isWeekend=di>=5;
                  return (
                    <div key={hr}
                      style={{gridRow:hi+1,gridColumn:1,background:isWeekend?"#EAE3D3":"#FDFAF5",
                        borderRadius:3,border:`0.5px solid ${isWeekend?"#D8D5CE":"#DDD5C4"}`,
                        position:"relative"}}>
                    </div>
                  );
                })}

                {/* Translate deadline blocks (8:00-9:00 slot) */}
                {[...transDeadlines,...transPaid].map((t,idx)=>{
                  const isPaid=transPaid.includes(t);
                  const bg    =expTrans===t.id?(isPaid?"#C9D7DD":"#E8DDD4"):(isPaid?"#D5DFF0":"#E8DABB");
                  const bdr   =expTrans===t.id?(isPaid?"1.5px solid #4A6080":"1.5px solid #7A6251"):(isPaid?"1px solid #8A9BB5":"1px solid #C6A75E");
                  const color =isPaid?"#1F2A44":"#6B4F3A";
                  const label =isPaid?"◈":"⟐";
                  const shortName=t.name.replace(/^\[.*?\]\s*/,"");
                  // stack multiple items: each takes rowStart=1 but offset via marginTop hack
                  return (
                    <div key={t.id}
                      onClick={ev=>{ev.stopPropagation();setExpTrans(expTrans===t.id?null:t.id);}}
                      style={{gridRow:`1 / span 1`,gridColumn:1,
                        background:bg,borderRadius:4,padding:"4px 6px",cursor:"pointer",
                        border:bdr,overflow:"hidden",zIndex:2+idx,
                        marginTop:idx*38}}>
                      <div style={{fontSize:10,color,fontWeight:700,lineHeight:1.4}}>{label} 翻譯</div>
                      <div style={{fontSize:10,color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shortName}</div>

                    </div>
                  );
                })}

                {/* Course blocks */}
                {dayTeaches.map(c=>{
                  const g=timeToGrid(c.time);
                  if(!g) return null;
                  const clamp=Math.min(g.rowSpan, TOTAL_HRS-g.rowStart+1);
                  if(g.rowStart<1||g.rowStart>TOTAL_HRS) return null;
                  return (
                    <div key={c.id}
                      onClick={e=>{e.stopPropagation();setExpCourse(expCourse===c.id?null:c.id);}}
                      style={{gridRow:`${g.rowStart} / span ${clamp}`,gridColumn:1,
                        background:"#D5DFF0",borderRadius:4,padding:"4px 6px",cursor:"pointer",
                        border:expCourse===c.id?"1.5px solid #1F2A44":"1px solid #8A9BB5",
                        overflow:"hidden",zIndex:2}}>
                      <div style={{fontSize:10,color:"#1F2A44",fontWeight:700,lineHeight:1.4}}>⊞ 授課</div>
                      <div style={{fontSize:10,color:"#4A6080",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.location.replace("香山區-","").replace("(華鹿)","").replace("(懷安)","")}</div>
                      <div style={{fontSize:9,color:"#8C9BA3"}}>{c.time}</div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>

      {/* Expanded course detail */}
      {expCourse&&(()=>{
        const c=courses.find(x=>x.id===expCourse); if(!c) return null;
        return <div style={{marginLeft:30}}><CoursePanel c={c} onClose={()=>setExpCourse(null)} onEdit={()=>onEditCourse(c)} onMarkPaid={()=>{setPaidDateInput(c.feeDate||"");setPaidModal({type:"course",id:c.id,name:c.location,currentPaid:c.feePaid});}}/></div>;
      })()}
      {/* Expanded translate detail */}
      {expTrans&&(()=>{
        const t=tasks.find(x=>x.id===expTrans); if(!t) return null;
        return <div style={{marginLeft:30}}><TransPanel t={t} onClose={()=>setExpTrans(null)} onEdit={()=>{setExpTrans(null);onEditTrans(t);}}/></div>;
      })()}

    </div>
  );
}

// ── Month View ────────────────────────────────────────────
function calcHrs(timeStr) {
  if (!timeStr) return 0;
  const [s,e] = timeStr.split("~");
  if (!s||!e) return 0;
  const toMin = t => { const [h,m]=t.split(":").map(Number); return h*60+(m||0); };
  return Math.max(0,(toMin(e)-toMin(s))/60);
}

function MonthView({courses,allMonths,selMonth,setSelMonth,expCourse,setExpCourse,todoInput,setTodoInput,addTodo,toggleTodo,delTodo,onEdit,onAdd}) {
  const mc=sortByDate(courses.filter(c=>c.date.startsWith(selMonth+"/")));
  const dim=new Date(2026,+selMonth,0).getDate();
  const fdow=new Date(2026,+selMonth-1,1).getDay();
  const off=fdow===0?6:fdow-1;
  const cells=Array.from({length:off+dim},(_,i)=>i<off?null:i-off+1);
  while(cells.length%7!==0) cells.push(null);

  // 計算所有月份的各類別時數（用於月份 tab tooltip）
  const monthStats = m => {
    const mcs = courses.filter(c=>c.date.startsWith(m+"/"));
    const gov   = mcs.filter(c=>c.category==="gov").reduce((s,c)=>s+calcHrs(c.time),0);
    const local = mcs.filter(c=>c.category==="local").reduce((s,c)=>s+calcHrs(c.time),0);
    const other = mcs.filter(c=>c.category==="other").reduce((s,c)=>s+calcHrs(c.time),0);
    return {gov,local,other,total:gov+local+other};
  };

  // 當月統計
  const stat = monthStats(selMonth);

  return (
    <div>
      {/* 月份 tabs */}
      <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        {allMonths.map(m=>(
          <button key={m} onClick={()=>setSelMonth(m)}
            style={{padding:"4px 10px",borderRadius:16,border:"1.5px solid",fontSize:11,cursor:"pointer",fontFamily:"inherit",
              borderColor:selMonth===m?"#1F2A44":"#e0e0e0",background:selMonth===m?"#1F2A44":"#fff",color:selMonth===m?"#fff":"#555"}}>
            {m}月
          </button>
        ))}
        <button onClick={onAdd} style={{...btnS(),marginLeft:"auto",padding:"4px 12px",fontSize:11}}>＋ 新增課程</button>
      </div>
      <div style={{background:"#FDFAF5",borderRadius:10,padding:"8px",marginBottom:8}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:3}}>
          {["一","二","三","四","五","六","日"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"#ccc"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
          {cells.map((day,i)=>{
            if(!day) return <div key={i}/>;
            const ds=`${selMonth}/${day}`,ts=courses.filter(c=>c.date===ds);
            const isWeekend=(i%7)>=5;
            return (
              <div key={i} onClick={()=>ts.length&&setExpCourse(ts[0].id===expCourse?null:ts[0].id)}
                style={{textAlign:"center",padding:"3px 1px",borderRadius:4,cursor:ts.length?"pointer":"default",
                  background:ds===TODAY_STR?"#1F2A44":ts.length?"#D4DCED":isWeekend?"#f8f5f0":"transparent"}}>
                <div style={{fontSize:10,color:ds===TODAY_STR?"#8A9BB5":ts.length?"#4E5E5C":isWeekend?"#bbb":"#555"}}>{day}</div>
                {ts.length>0&&<div style={{fontSize:7,color:"#7A9290"}}>{"•".repeat(Math.min(ts.length,3))}</div>}
              </div>
            );
          })}
        </div>
      </div>
      <div style={{fontSize:11,color:"#888",marginBottom:6}}>{selMonth}月 共 {mc.length} 堂</div>
      {/* 當月時數統計 */}
      <div style={{display:"flex",gap:4,marginBottom:8}}>
        {[["gov","市政府",stat.gov],["local","地區類",stat.local],["other","其他類",stat.other]].map(([cat,label,hrs])=>(
          <div key={cat} style={{flex:1,background:CAT_BG[cat],borderRadius:6,padding:"5px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:10,color:CAT_COLOR[cat]}}>{label}</span>
            <span style={{fontSize:11,fontWeight:700,color:CAT_COLOR[cat]}}>{hrs}h</span>
          </div>
        ))}
        <div style={{background:"#EBEBEA",borderRadius:6,padding:"5px 8px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:44}}>
          <span style={{fontSize:9,color:"#7B7B78"}}>合計</span>
          <span style={{fontSize:11,fontWeight:700,color:"#444441"}}>{stat.total}h</span>
        </div>
      </div>
      {mc.map(c=>(
        <div key={c.id}>
          <CourseMiniCard c={c} expanded={expCourse===c.id} onClick={()=>setExpCourse(expCourse===c.id?null:c.id)} onEdit={()=>onEdit(c)}/>
          {expCourse===c.id&&<CoursePanel c={c} onClose={()=>setExpCourse(null)} onEdit={()=>onEdit(c)} onMarkPaid={()=>{setPaidDateInput(c.feeDate||"");setPaidModal({type:"course",id:c.id,name:c.location,currentPaid:c.feePaid});}}/>}
        </div>
      ))}
    </div>
  );
}

// ── Todos View ────────────────────────────────────────────
function TodosView({courses,freeTasks,freeInput,setFreeInput,addFree,togFree,delFree,toggleTodo,delTodo,onLogFree}) {
  const allTodos=courses.flatMap(c=>(c.todos||[]).map(t=>({...t,cid:c.id,cdate:c.date,cloc:c.location})));
  const pending=allTodos.filter(t=>!t.done), done=allTodos.filter(t=>t.done);
  const fpend=freeTasks.filter(t=>!t.done), fdone=freeTasks.filter(t=>t.done);
  return (
    <div>
      <div style={{background:"#FDFAF5",borderRadius:10,padding:"10px",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>📥 快速新增待辦</div>
        <div style={{display:"flex",gap:6}}>
          <input value={freeInput} onChange={e=>setFreeInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addFree()} placeholder="任何事都可以丟進來…" style={{...iStyle,flex:1}}/>
          <button onClick={addFree} style={btnS()}>+</button>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {[["備課待辦",pending.length,"#4E5E5C","#D4DCED"],["一般待辦",fpend.length,"#4A6080","#D5DFF0"],["已完成",done.length+fdone.length,"#6B6558","#E8E0CC"]].map(([l,v,c,bg])=>(
          <div key={l} style={{flex:1,background:bg,borderRadius:8,padding:"7px",textAlign:"center"}}>
            <div style={{fontSize:9,color:c}}>{l}</div>
            <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      {fpend.length>0&&(
        <div style={{background:"#FDFAF5",borderRadius:10,padding:"10px",marginBottom:6}}>
          <div style={{fontSize:11,fontWeight:700,color:"#4A6080",marginBottom:5}}>一般待辦</div>
          {fpend.map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 0",borderBottom:"0.5px solid #f5f5f5"}}>
              <Chk done={t.done} onToggle={()=>togFree(t.id)}/>
              <span style={{flex:1,fontSize:11}}>{t.text}</span>
              {(t.progress||0)>0&&<span style={{fontSize:9,color:"#4A6080"}}>{t.progress}/10</span>}
              <button onClick={()=>onLogFree(t)} style={btnS("#4A6080","#D5DFF0",{fontSize:9,padding:"2px 6px"})}>記錄進度</button>
              <button onClick={()=>delFree(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:11,padding:0}}>✕</button>
            </div>
          ))}
        </div>
      )}
      {pending.length>0&&(
        <div style={{background:"#FDFAF5",borderRadius:10,padding:"10px",marginBottom:6}}>
          <div style={{fontSize:11,fontWeight:700,color:"#4E5E5C",marginBottom:5}}>備課待辦</div>
          {pending.map(t=>(
            <div key={t.id} style={{marginBottom:3}}>
              <div style={{fontSize:9,color:"#bbb"}}>{t.cdate} {t.cloc}</div>
              <div style={{display:"flex",alignItems:"center",gap:7,padding:"4px 0",borderBottom:"0.5px solid #f5f5f5"}}>
                <Chk done={t.done} onToggle={()=>toggleTodo(t.cid,t.id)}/>
                <span style={{flex:1,fontSize:11}}>{t.text}</span>
                <button onClick={()=>delTodo(t.cid,t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:11,padding:0}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {(fdone.length+done.length)>0&&(
        <div style={{background:"#FDFAF5",borderRadius:10,padding:"10px",opacity:.6}}>
          <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>已完成 ({fdone.length+done.length})</div>
          {fdone.map(t=><div key={t.id} style={{display:"flex",gap:7,padding:"3px 0",alignItems:"center"}}><Chk done onToggle={()=>togFree(t.id)}/><span style={{fontSize:11,color:"#bbb",}}>{t.text}</span></div>)}
          {done.map(t=><div key={t.id} style={{display:"flex",gap:7,padding:"3px 0",alignItems:"center"}}><Chk done onToggle={()=>toggleTodo(t.cid,t.id)}/><span style={{fontSize:11,color:"#bbb",}}>{t.text}</span></div>)}
        </div>
      )}
    </div>
  );
}

// ── Log Modal ─────────────────────────────────────────────
function LogModal({logModal,tasks,freeTasks,onClose,onConfirm}) {
  const allChoices=[
    ...tasks.map(t=>({...t,isFree:false,displayName:t.name,remaining:10-t.done})),
    ...freeTasks.filter(f=>!f.done).map(f=>({id:f.id,isFree:true,displayName:f.text,done:f.progress||0,remaining:10-(f.progress||0),color:"#8B5CF6",bg:"#EDE9FE",deadline:null})),
  ];
  const defId = logModal.taskId||(allChoices[0]?.id||"");
  const [selId,setSelId]=useState(defId);
  const [units,setUnits]=useState(1);
  const sel=allChoices.find(t=>t.id===selId);
  const rem=sel?.remaining||0;
  return (
    <OvBox onClick={onClose}>
      <div onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{background:"#FDFAF5",borderRadius:14,padding:"16px",width:"100%",maxWidth:320}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>記錄工作進度</div>
        <div style={{fontSize:11,color:"#aaa",marginBottom:8}}>{logModal.slotDate}{logModal.slotTime?" · "+logModal.slotTime:""}</div>
        <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:180,overflowY:"auto",marginBottom:10}}>
          {allChoices.map(t=>(
            <div key={t.id} onClick={()=>setSelId(t.id)}
              style={{padding:"7px 9px",borderRadius:7,border:"1.5px solid",borderColor:selId===t.id?t.color:"#e0e0e0",background:selId===t.id?t.bg:"#fff",cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:11,fontWeight:600,color:selId===t.id?t.color:"#555"}}>{t.displayName}</span>
                <span style={{fontSize:10,color:"#aaa"}}>{t.done}/10</span>
              </div>
              <div style={{marginTop:3,height:3,background:"#DDD5C4",borderRadius:2}}>
                <div style={{width:`${t.done*10}%`,height:"100%",background:t.color}}/>
              </div>
              {t.deadline&&<div style={{fontSize:9,color:daysUntil(t.deadline)<=3?"#c0392b":daysUntil(t.deadline)<=7?"#e67e22":"#888",marginTop:1}}>截止 {t.deadline}・{daysUntil(t.deadline)>0?`${daysUntil(t.deadline)}天`:"今天"}</div>}
            </div>
          ))}
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"#555",marginBottom:5}}>完成等分（剩 {rem}）</div>
          <div style={{display:"flex",gap:5}}>
            {[1,2,3,4,5].filter(u=>u<=rem).map(u=>(
              <button key={u} onClick={()=>setUnits(u)} style={{width:36,height:32,borderRadius:7,border:"1.5px solid",borderColor:units===u?"#1F2A44":"#e0e0e0",background:units===u?"#1F2A44":"#fff",color:units===u?"#fff":"#555",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{u}</button>
            ))}
            {rem===0&&<span style={{fontSize:11,color:"#2d6a4f",padding:"7px 0"}}>✓ 已完成</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={btnS("#555","#f0f0f0")}>取消</button>
          <button onClick={()=>rem>0&&onConfirm(selId,units,sel?.isFree)} style={{...btnS(),opacity:rem>0?1:.4}}>確認</button>
        </div>
      </div>
    </OvBox>
  );
}

// ── MonthGroup (top-level to prevent re-render on input) ──
function MonthGroup({monthNum, allCourses, monthlyPaid, toggleMonthPaid, onEditCourse, onSaveCourseFee, toNum, sDate, pill, defaultOpen}) {
  const [mOpen,setMOpen] = useState(defaultOpen!==undefined&&defaultOpen!==null ? defaultOpen : true);
  const open = mOpen;
  const [isEditing,setIsEditing] = useState(false);
  const [paidInput,setPaidInput] = useState("");
  const [amtInput, setAmtInput]  = useState("");
  const mCourses  = sDate(allCourses.filter(c=>c.date.startsWith(monthNum+"/")));
  const mKey      = `2026/${monthNum}`;
  const mp        = monthlyPaid[mKey];
  const mTotal    = mCourses.filter(c=>c.fee).reduce((s,c)=>s+toNum(c.fee),0);
  const noFeeCount= mCourses.filter(c=>!c.fee).length;
  const allPaid   = mp?.paid||false;
  const confirm   = () => { toggleMonthPaid(mKey,paidInput,amtInput); setIsEditing(false); };
  const cancel    = () => setIsEditing(false);
  return (
    <div style={{background:"#FDFAF5",borderRadius:10,marginBottom:8,overflow:"hidden",border:"1px solid #DDD5C4"}}>
      <div style={{padding:"9px 12px",background:allPaid?"#FDFAF5":"#E8DABB",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <span style={{fontSize:12,fontWeight:700,color:allPaid?"#aaa":"#4A3728",flex:1}}>2026年{monthNum}月</span>
        <span style={{fontSize:11,fontWeight:700,color:allPaid?"#bbb":"#4A3728"}}>
          {mCourses.length}堂{mTotal>0?` · $${mTotal.toLocaleString()}`:""}
        </span>
        {isEditing
          ? <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
              <input value={paidInput} onChange={e=>setPaidInput(e.target.value)} placeholder="入帳日期"
                onKeyDown={e=>{if(e.key==="Enter")confirm();if(e.key==="Escape")cancel();}}
                style={{width:78,padding:"3px 7px",borderRadius:6,border:"1px solid #aaa",fontSize:10,fontFamily:"inherit",outline:"none"}}/>
              <input value={amtInput} onChange={e=>setAmtInput(e.target.value)} placeholder="實際金額"
                onKeyDown={e=>{if(e.key==="Enter")confirm();if(e.key==="Escape")cancel();}}
                style={{width:88,padding:"3px 7px",borderRadius:6,border:"1px solid #aaa",fontSize:10,fontFamily:"inherit",outline:"none"}}/>
              <button onClick={confirm} style={{padding:"3px 8px",borderRadius:6,border:"none",background:"#1F2A44",color:"#fff",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>確認</button>
              <button onClick={cancel}  style={{padding:"3px 6px",borderRadius:6,border:"1px solid #ddd",background:"#FDFAF5",color:"#888",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
            </div>
          : <button onClick={()=>allPaid?toggleMonthPaid(mKey,"",""):(setIsEditing(true),setPaidInput(mp?.paidDate||""),setAmtInput(mp?.paidAmt||""))}
              style={{fontSize:10,padding:"3px 9px",borderRadius:99,cursor:"pointer",fontFamily:"inherit",
                background:allPaid?"transparent":"#C6A75E",color:allPaid?"#ccc":"#4A3728",fontWeight:600,
                border:allPaid?"1px solid #DDD5C4":"none"}}>
              {allPaid?`合計 ${mp?.paidAmt?"$"+mp.paidAmt:"$"+mTotal.toLocaleString()}${mp?.paidDate?" "+mp.paidDate:""}`:"整月入帳"}
            </button>
        }
        <button onClick={()=>setMOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,padding:0,color:"#bbb",fontFamily:"inherit"}}>{open?"▲":"▼"}</button>
      </div>
      {open&&(
        <div style={{padding:"4px 10px"}}>
          {mCourses.map(c=><CourseFeeRow key={c.id} c={c} allPaid={allPaid} onEditCourse={onEditCourse} onSaveCourseFee={onSaveCourseFee} pill={pill}/>)}
        </div>
      )}
    </div>
  );
}

function CourseFeeRow({c,allPaid,onEditCourse,onSaveCourseFee,pill}) {
  const [editing,setEditing] = useState(false);
  const [feeVal,  setFeeVal]  = useState("");
  const save = () => { onSaveCourseFee(c.id,feeVal); setEditing(false); };
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"0.5px solid #f5f5f5",opacity:allPaid?0.6:1}}>
      <span style={pill(CAT_COLOR[c.category]||"#333",CAT_BG[c.category]||"#eee")}>{CAT_LABEL[c.category]}</span>
      <span style={{fontSize:10,color:"#aaa",flexShrink:0}}>{c.date}</span>
      <span style={{flex:1,fontSize:11,color:"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
        {c.location.replace("香山區-","").replace("(華鹿)","").replace("(懷安)","").replace(")","").replace("(","").trim()} 第{c.session}堂
      </span>
      {editing
        ? <div style={{display:"flex",gap:3,alignItems:"center",flexShrink:0}}>
            <input value={feeVal} onChange={e=>setFeeVal(e.target.value)} placeholder="金額"
              onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}}
              autoFocus
              style={{width:70,padding:"2px 6px",borderRadius:5,border:"1px solid #aaa",fontSize:10,fontFamily:"inherit",outline:"none"}}/>
            <button onClick={save} style={{padding:"2px 7px",borderRadius:5,border:"none",background:"#1F2A44",color:"#fff",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>存</button>
            <button onClick={()=>setEditing(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:10,padding:0,fontFamily:"inherit"}}>✕</button>
          </div>
        : <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            <span style={{fontSize:11,fontWeight:600,color:c.fee?"#555":"#bbb"}}>{c.fee?`$${c.fee}`:"未填"}</span>
            <button onClick={()=>{setEditing(true);setFeeVal(c.fee||"");}}
              style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:10,padding:0,fontFamily:"inherit",lineHeight:1}}>✎</button>
          </div>
      }
    </div>
  );
}

function TaskRow({r,onMarkPaid}) {
  const isPaid = r.feePaid;
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:"0.5px solid #DDD5C4",opacity:isPaid?0.5:1}}>
      <span style={{fontSize:10,color:"#bbb",flexShrink:0,width:46}}>{r.date}</span>
      <span style={{flex:1,fontSize:11,color:isPaid?"#bbb":"#1F2A44",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</span>
      <div style={{textAlign:"right",flexShrink:0,minWidth:0}}>
        <div style={{fontSize:11,fontWeight:600,color:isPaid?"#bbb":"#1F2A44"}}>{r.fee}</div>
        {(r.feeBank||r.feePaidDate)&&<div style={{fontSize:9,color:"#ccc"}}>{r.feePaidDate||r.feeBank}</div>}
      </div>
      {!isPaid&&<button onClick={()=>onMarkPaid(r)}
        style={{width:52,fontSize:9,padding:"2px 0",borderRadius:99,cursor:"pointer",fontFamily:"inherit",flexShrink:0,
          background:"#C6A75E",color:"#1F2A44",fontWeight:600,border:"none"}}>
        · 待入帳
      </button>}
    </div>
