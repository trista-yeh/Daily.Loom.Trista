}

function TaskGroup({title,items,color,onMarkPaid,defaultOpen}) {
  const [_open,setOpen] = useState(defaultOpen!==undefined&&defaultOpen!==null ? defaultOpen : true);
  const open = _open;
  const toNum = s => parseFloat((s||"").replace(/[^0-9.]/g,""))||0;
  if(!items||items.length===0) return null;
  const sub=items.reduce((s,r)=>s+toNum(r.fee),0);
  const isPaid = color==="paid";
  // 標題格式化："2025/2" → "2025年2月"，"2025/2（待入帳）" → "2025年2月・待入帳"
  const formatTitle = t => {
    const match = t.match(/^(\d{4})\/(\d{1,2})(（.*）)?$/);
    if (match) {
      const pending = match[3] ? match[3].replace(/[（）]/g,"") : "";
      return pending ? `${match[1]}年${match[2]}月　${pending}` : `${match[1]}年${match[2]}月`;
    }
    return t;
  };
  return (
    <div style={{background:"#FDFAF5",borderRadius:10,marginBottom:8,overflow:"hidden",border:"1px solid #DDD5C4"}}>
      <div style={{padding:"9px 12px",background:isPaid?"#FDFAF5":"#E8DABB",display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}
        onClick={()=>setOpen(o=>!o)}>
        <span style={{fontSize:12,fontWeight:700,color:isPaid?"#aaa":"#4A3728",flex:1}}>{formatTitle(title)}</span>
        {!open&&<span style={{fontSize:10,color:"#aaa",flexShrink:0}}>{items.length} 本</span>}
        <span style={{fontSize:11,fontWeight:700,color:isPaid?"#bbb":"#4A3728"}}>合計 ${sub.toLocaleString()}</span>
        <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>{open?"▲":"▼"}</span>
      </div>
      {open&&<div style={{padding:"0 10px"}}>{items.map(r=><TaskRow key={r.id} r={r} onMarkPaid={onMarkPaid}/>)}</div>}
    </div>
  );
}

function FinanceView({courses,tasks,toggleFeePaid,toggleTaskFeePaid,onGoToCourse,onMarkPaid,onEditCourse,monthlyPaid,toggleMonthPaid,onSaveCourseFee}) {
  const [tab,setTab] = useState("all");
  const toNum = s => parseFloat((s||"").replace(/[^0-9.]/g,""))||0;
  const sDate = items => [...items].sort((a,b)=>{
    const pad = d=>{ const[m,day]=(d||"0/0").split("/"); return (+m)*100+(+day); };
    return pad(b.date)-pad(a.date);
  });

  const allCourses   = courses;
  const courseMonths = [...new Set(allCourses.map(c=>c.date.split("/")[0]))].sort((a,b)=>+b-+a);

  const taskItems = sDate(tasks.filter(t=>t.fee).map(t=>({
    id:`t_${t.id}`,type:"task",name:t.name,date:t.deadline||"",fee:t.fee,
    feeBank:t.feeBank||"",feeDate:t.feeDate||"",feePaid:t.feePaid||false,feePaidDate:t.feePaidDate||"",
    color:t.color,bg:t.bg,rawId:t.id,
  })));

  const courseWithFee  = allCourses.filter(c=>c.fee);
  const courseTotalAmt = courseWithFee.reduce((s,c)=>s+toNum(c.fee),0);
  const coursePaidAmt  = Object.entries(monthlyPaid).filter(([,v])=>v.paid)
    .reduce((s,[k,v])=>{
      const m=k.split("/")[1];
      const mc=courseWithFee.filter(c=>c.date.startsWith(m+"/"));
      return s+(v.paidAmt?parseFloat(v.paidAmt.replace(/[^0-9.]/g,"")||0):mc.reduce((ss,c)=>ss+toNum(c.fee),0));
    },0);
  const taskTotalAmt = taskItems.reduce((s,r)=>s+toNum(r.fee),0);
  const taskPaidAmt  = taskItems.filter(r=>r.feePaid).reduce((s,r)=>s+toNum(r.fee),0);
  const totalAmt = tab==="course"?courseTotalAmt : tab==="task"?taskTotalAmt : courseTotalAmt+taskTotalAmt;
  const paidAmt  = tab==="course"?coursePaidAmt  : tab==="task"?taskPaidAmt  : coursePaidAmt+taskPaidAmt;

  // 翻譯按入帳月份分組
  const taskMonths = [...new Set(taskItems.map(r=>{
    if (r.feePaid && r.feePaidDate) {
      const [m] = r.feePaidDate.split("/");
      return m ? m+"月" : "未分類";
    }
    return r.feePaid ? "已入帳" : "待入帳";
  }))];

  // 翻譯全部按年月分組：已入帳用 feePaidDate（YYYY/M），待入帳用 feeDate
  const taskByMonth = {};
  const addToGroup = (key, r) => { if(!taskByMonth[key]) taskByMonth[key]=[]; taskByMonth[key].push(r); };

  // 從 "YYYY/M" 或 "YYYY/M/D" 取出 "YYYY/M" 作為 key
  const toYearMonth = s => {
    if (!s) return "";
    const parts = s.replace(/[（(].*/, "").trim().split("/");
    if (parts.length >= 2 && parseInt(parts[0]) > 12) {
      return `${parts[0]}/${parts[1]}`; // YYYY/M
    }
    return ""; // 無年份，無法分組
  };

  taskItems.filter(r=>r.feePaid).forEach(r=>{
    const ym = toYearMonth(r.feePaidDate);
    addToGroup(ym || "已入帳（無日期）", r);
  });
  taskItems.filter(r=>!r.feePaid).forEach(r=>{
    const ym = toYearMonth(r.feeDate);
    addToGroup(ym ? ym+"（待入帳）" : "待入帳", r);
  });

  // 排序：待入帳排最前，其次依年月由小到大（早的在前）
  const allMonthKeys = Object.keys(taskByMonth).sort((a,b)=>{
    const aUnpaid = a.includes("待");
    const bUnpaid = b.includes("待");
    if (aUnpaid !== bUnpaid) return aUnpaid ? -1 : 1;
    const parseYM = s => { const [y,m]=(s.split("（")[0]).split("/"); return (+y||9999)*100+(+m||99); };
    return parseYM(a) - parseYM(b);
  });

  // 當月（2026年，用 TODAY 的月份）統計
  const curYear = 2026, curMonth = TODAY.getMonth()+1;
  const curYM = `${curYear}/${curMonth}`;
  const curMonthPaid = (taskByMonth[curYM]||[]).reduce((s,r)=>s+toNum(r.fee),0)
    + (taskByMonth[curYM+"（待入帳）"]||[]).filter(r=>r.feePaid).reduce((s,r)=>s+toNum(r.fee),0);
  const curMonthTotal = [...(taskByMonth[curYM]||[]),...(taskByMonth[curYM+"（待入帳）"]||[])].reduce((s,r)=>s+toNum(r.fee),0)
    + (courseMonths.includes(String(curMonth)) ? allCourses.filter(c=>c.date.startsWith(curMonth+"/")&&c.fee).reduce((s,c)=>s+toNum(c.fee),0) : 0);

  // 全年已入帳（task paid + course paid）
  const yearPaid = taskPaidAmt + coursePaidAmt;

  // allOpen: { defaultOpen: bool, epoch: number } — 每次全開/全收時 epoch+1，觸發子元件 remount，以 defaultOpen 初始化
  const [allOpen, setAllOpen] = useState(null);
  const triggerAll = (val) => setAllOpen(prev => ({defaultOpen: val, epoch: (prev?.epoch||0)+1}));

  const showCourse = tab==="all"||tab==="course";
  const showTask   = tab==="all"||tab==="task";

  return (
    <div>
      {/* Tab + 全開/全收 */}
      <div style={{display:"flex",gap:5,marginBottom:8,alignItems:"center"}}>
        {[["all","全部"],["course","授課"],["task","翻譯"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"7px",borderRadius:9,border:"1.5px solid",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
              borderColor:tab===k?"#1F2A44":"#e0e0e0",background:tab===k?"#1F2A44":"#fff",color:tab===k?"#fff":"#555"}}>{l}</button>
        ))}
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          <button onClick={()=>triggerAll(true)}  style={{padding:"5px 8px",borderRadius:7,border:"1px solid #e0e0e0",background:"#FDFAF5",color:"#555",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>全開</button>
          <button onClick={()=>triggerAll(false)} style={{padding:"5px 8px",borderRadius:7,border:"1px solid #e0e0e0",background:"#FDFAF5",color:"#555",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>全收</button>
        </div>
      </div>

      {showCourse&&(
        <div style={{marginBottom:tab==="all"?16:0}}>
          {/* 授課小計 */}
          <div style={{background:"#FDFAF5",borderRadius:10,padding:"10px 12px",marginBottom:8,border:"1px solid #DDD5C4"}}>
            <div style={{fontSize:10,letterSpacing:"1px",color:"#8C8880",marginBottom:6}}>⊞ 授課講師費</div>
            <div style={{display:"flex",gap:5}}>
              {[["合計",courseTotalAmt,"#1F2A44","#F2ECE0"],["已入帳",coursePaidAmt,"#4E5E5C","#D5DFF0"],["待入帳",courseTotalAmt-coursePaidAmt,"#7A6251","#E8DABB"]].map(([l,v,c,bg])=>(
                <div key={l} style={{flex:1,background:bg,borderRadius:7,padding:"5px 8px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:c,marginBottom:1}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:700,color:c}}>${v.toLocaleString()}</div>
                </div>
              ))}
            </div>
          </div>
          {courseMonths.map(m=>(
            <MonthGroup key={m+(allOpen?.epoch||0)} monthNum={m} allCourses={allCourses} monthlyPaid={monthlyPaid}
              toggleMonthPaid={toggleMonthPaid} onEditCourse={onEditCourse}
              onSaveCourseFee={onSaveCourseFee} toNum={toNum} sDate={sDate} pill={pill}
              defaultOpen={allOpen?.defaultOpen}/>
          ))}
          {courseMonths.length===0&&<div style={{textAlign:"center",padding:"20px",color:"#ccc",fontSize:12}}>暫無課程記錄</div>}
        </div>
      )}
      {showTask&&(
        <div>
          {/* 翻譯小計 */}
          <div style={{background:"#FDFAF5",borderRadius:10,padding:"10px 12px",marginBottom:8,border:"1px solid #DDD5C4"}}>
            <div style={{fontSize:10,letterSpacing:"1px",color:"#8C8880",marginBottom:6}}>⟐ 翻譯稿費</div>
            <div style={{display:"flex",gap:5}}>
              {[["合計",taskTotalAmt,"#1F2A44","#F2ECE0"],["已入帳",taskPaidAmt,"#4E5E5C","#D5DFF0"],["待入帳",taskTotalAmt-taskPaidAmt,"#7A6251","#E8DABB"]].map(([l,v,c,bg])=>(
                <div key={l} style={{flex:1,background:bg,borderRadius:7,padding:"5px 8px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:c,marginBottom:1}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:700,color:c}}>${v.toLocaleString()}</div>
                </div>
              ))}
            </div>
          </div>
          {allMonthKeys.map(mk=>(
            <TaskGroup key={mk+(allOpen?.epoch||0)} title={mk}
              items={taskByMonth[mk]}
              color={mk.includes("待")?"unpaid":"paid"}
              onMarkPaid={onMarkPaid}
              defaultOpen={allOpen?.defaultOpen}/>
          ))}
          {taskItems.length===0&&<div style={{textAlign:"center",padding:"20px",color:"#ccc",fontSize:12}}>尚無翻譯費用記錄</div>}
        </div>
      )}
    </div>
  );
}


// ── Trans View ────────────────────────────────────────────
function TransView({translates,transTab,setTransTab,onAdd,onEdit,onArchive,onDelete}) {
  const [archiveSort, setArchiveSort] = React.useState("desc");
  const active  = translates.filter(t=>!t.archived).sort((a,b)=>{
    const pad=d=>{const[m,day]=(d||"99/99").split("/");return +m*100+(+day);};
    return pad(a.deadline)-pad(b.deadline);
  });
  const archived= translates.filter(t=>t.archived).sort((a,b)=>{
    const pa = a.pubDate||"", pb = b.pubDate||"";
    return archiveSort==="asc" ? pa.localeCompare(pb) : pb.localeCompare(pa);
  });

  const daysLabel = d => {
    if (!d) return "";
    const [m,day]=d.split("/").map(Number);
    const diff=Math.ceil((new Date(2026,m-1,day)-TODAY)/864e5);
    if (diff<0)  return {label:`逾期${Math.abs(diff)}天`,color:"#c0392b",bg:"#FCEBEB"};
    if (diff===0)return {label:"今天截稿",color:"#c0392b",bg:"#FCEBEB"};
    if (diff<=7) return {label:`${diff}天後`,color:"#e67e22",bg:"#E8DABB"};
    return {label:`${diff}天後`,color:"#2d6a4f",bg:"#D5DFF0"};
  };

  return (
    <div>
      <div style={{display:"flex",gap:5,marginBottom:10,background:"#FDFAF5",borderRadius:10,padding:"6px"}}>
        {[["active","⟐ 進行中"],["archive","◎ 作品集"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTransTab(k)} style={{flex:1,padding:"6px",borderRadius:8,border:"none",cursor:"pointer",
            fontSize:12,fontWeight:600,fontFamily:"inherit",
            background:transTab===k?"#1F2A44":"transparent",color:transTab===k?"#8A9BB5":"#888"}}>{l}</button>
        ))}
      </div>

      {transTab==="active"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,color:"#888"}}>進行中 {active.length} 件</span>
            <button onClick={onAdd} style={btnS()}>＋ 新增翻譯</button>
          </div>
          {active.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#ccc",fontSize:12}}>尚無進行中的翻譯案件</div>}
          {(()=>{
            // 按截稿月份分組
            const groups = {};
            active.forEach(t=>{
              const m = t.deadline ? t.deadline.split("/")[0] : "";
              const key = m ? m+"月" : "待確認截稿日";
              if (!groups[key]) groups[key]=[];
              groups[key].push(t);
            });
            const keys = Object.keys(groups).sort((a,b)=>{
              const na=parseInt(a)||999, nb=parseInt(b)||999;
              return na-nb;
            });
            return keys.map(month=>(
              <div key={month} style={{marginBottom:12}}>
                {/* 月份標題 */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"6px 10px",background:"#EDE5D4",borderRadius:8}}>
                  <span style={{fontSize:11,fontWeight:500,color:"#1F2A44"}}>{month}</span>
                  <span style={{fontSize:10,color:"#888"}}>{groups[month].length} 件</span>
                </div>
                {groups[month].map(t=>{
                  const dl=daysLabel(t.deadline);
                  return (
                    <div key={t.id} style={{background:"#FDFAF5",borderRadius:10,padding:"12px",marginBottom:6,borderLeft:"3px solid #C6A75E"}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:6,marginBottom:4}}>
                        <div style={{flex:1,minWidth:0}}>
                          {t.publisher&&<div style={{fontSize:10,color:"#8A9BB5",fontWeight:400,marginBottom:2}}>【{t.publisher}】</div>}
                          <div style={{fontSize:12,fontWeight:500,color:"#1F2A44"}}>{t.title}</div>
                        </div>
                        {dl&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:99,background:dl.bg,color:dl.color,fontWeight:600,flexShrink:0}}>{dl.label}</span>}
                      </div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:t.note?4:0}}>
                        {t.deadline&&<span style={{fontSize:10,color:"#888"}}>截稿 {t.deadline}</span>}
                        {t.fee&&<span style={{fontSize:10,color:"#555",fontWeight:600}}>稿費 {t.fee}</span>}
                        {t.feeBank&&<span style={{fontSize:10,color:"#aaa"}}>{t.feeBank}</span>}
                        {t.feeDate&&<span style={{fontSize:10,color:"#aaa"}}>預計入帳 {t.feeDate}</span>}
                      </div>
                      {t.note&&<div style={{fontSize:10,color:"#888",background:"#f8f8f8",borderRadius:5,padding:"3px 8px",marginBottom:4}}>{t.note}</div>}
                      <div style={{display:"flex",gap:5,justifyContent:"flex-end",marginTop:4}}>
                        <button onClick={()=>onEdit(t)} style={btnS("#555","#f0f0f0",{fontSize:10,padding:"3px 10px"})}>編輯</button>
                        <button onClick={()=>onArchive(t.id)} style={btnS("#1F2A44","#E8DABB",{fontSize:10,padding:"3px 10px",fontWeight:500})}>完稿 → 作品集</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            ));
          })()}
        </div>
      )}

      {transTab==="archive"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:11,color:"#888"}}>作品集 {archived.length} 件</span>
            <div style={{display:"flex",gap:3}}>
              <button onClick={()=>setArchiveSort("asc")} style={{padding:"3px 7px",borderRadius:6,border:`1px solid ${archiveSort==="asc"?"#1F2A44":"#e0e0e0"}`,background:archiveSort==="asc"?"#1F2A44":"#fff",color:archiveSort==="asc"?"#8A9BB5":"#aaa",fontSize:13,cursor:"pointer",lineHeight:1}}>↑</button>
              <button onClick={()=>setArchiveSort("desc")} style={{padding:"3px 7px",borderRadius:6,border:`1px solid ${archiveSort==="desc"?"#1F2A44":"#e0e0e0"}`,background:archiveSort==="desc"?"#1F2A44":"#fff",color:archiveSort==="desc"?"#8A9BB5":"#aaa",fontSize:13,cursor:"pointer",lineHeight:1}}>↓</button>
            </div>
          </div>
          {archived.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#ccc",fontSize:12}}>尚無完成作品</div>}
          {(()=>{
            const unpublished = archived.filter(t=>!t.pubDate);
            const published   = archived.filter(t=>t.pubDate);
            const ArchiveCard = ({t}) => (
              <div key={t.id} style={{background:"#FDFAF5",borderRadius:10,padding:"11px 12px",marginBottom:6,borderLeft:"3px solid #aaa"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  {t.publisher&&<span style={{fontSize:10,color:"#8A9BB5",fontWeight:400}}>【{t.publisher}】</span>}
                  <span style={{fontSize:12,fontWeight:500,flex:1,color:"#1F2A44"}}>{t.title}</span>
                  <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                    <button onClick={()=>onEdit(t)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:11,padding:0,fontFamily:"inherit"}}>✎</button>
                    <button onClick={()=>onArchive(t.id,"unarchive")} style={btnS("#555","#f0f0f0",{fontSize:13,padding:"3px 8px"})} title="移回進行中">↩</button>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {t.pubDate&&<span style={{fontSize:10,color:"#555"}}>出版 {t.pubDate}</span>}
                  {t.fee&&<span style={{fontSize:10,color:"#aaa"}}>稿費 {t.fee}</span>}
                  {t.feePaid&&<span style={{fontSize:10,color:"#4E5E5C",fontWeight:600}}>✓ 已入帳{t.feePaidDate?" "+t.feePaidDate:""}</span>}
                </div>
                {t.pubNote&&<div style={{fontSize:10,color:"#aaa",marginTop:3}}>{t.pubNote}</div>}
              </div>
            );
            return (
              <>
                {unpublished.length>0&&(
                  <div style={{marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"6px 10px",background:"#E8DABB",borderRadius:8}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#7A6251"}}>◌ 尚未出版</span>
                      <span style={{fontSize:10,color:"#B09880"}}>{unpublished.length} 件</span>
                    </div>
                    {unpublished.map(t=><ArchiveCard key={t.id} t={t}/>)}
                  </div>
                )}
                {published.length>0&&(
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"6px 10px",background:"#E8E2D2",borderRadius:8}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#2A4060"}}>✦ 已出版</span>
                      <span style={{fontSize:10,color:"#7A9E94"}}>{published.length} 件</span>
                    </div>
                    {published.map(t=><ArchiveCard key={t.id} t={t}/>)}
                  </div>
                )}
              </>
            );
          })()}
        </div>
      )}
    </div>
  );
}

function DoneTaskList({tasks,freeTasks,delTask,delFree,setTasks,setFreeTasks,courses,calEvents,nextId,persist,toggleTaskFeePaid,onMarkPaid}) {
  const [open,setOpen] = useState(false);
  const doneTasks = tasks.filter(t=>t.done>=10);
  const doneFree  = freeTasks.filter(f=>f.done||(f.progress||0)>=10);
  const total = doneTasks.length + doneFree.length;
  if (total===0) return null;

  const undoTask = id => {
    const upd=tasks.map(t=>t.id!==id?t:{...t,done:9});
    setTasks(upd); persist(courses,upd,freeTasks,calEvents,nextId,monthlyPaid);
  };
  const undoFree = id => {
    const upd=freeTasks.map(f=>f.id!==id?f:{...f,done:false,progress:9});
    setFreeTasks(upd); persist(courses,tasks,upd,calEvents,nextId,monthlyPaid);
  };

  const doneTranslate = doneTasks.filter(t=>t.type==="translate");
  const doneTeach     = doneTasks.filter(t=>t.type==="teach"||t.type==="material");
  const doneOther     = [...doneTasks.filter(t=>t.type!=="translate"&&t.type!=="teach"&&t.type!=="material"), ...doneFree];

  const GroupHeader = ({icon,label,color,line,count}) => (
    <div style={{display:"flex",alignItems:"center",gap:6,margin:"8px 0 4px"}}>
      <span style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",color}}>{icon} {label}</span>
      <span style={{fontSize:10,color:"#8A9BB5"}}>{count}</span>
      <div style={{flex:1,height:"1px",background:line}}/>
    </div>
  );

  const TaskCard = ({t,onUndo,onDel,label,tc,tb}) => (
    <div style={{background:"#f8f8f8",borderRadius:8,padding:"8px 10px"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{...pill(tc,tb),flexShrink:0}}>{label}</span>
        <span style={{flex:1,fontSize:11,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(t.name||t.text||"").replace(/^教材：/,"")}</span>
        <button onClick={onUndo} style={{fontSize:9,padding:"2px 6px",borderRadius:5,border:"1px solid #ddd",background:"#FDFAF5",color:"#888",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>復原</button>
        <button onClick={onDel} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:11,padding:0,lineHeight:1,flexShrink:0}}>✕</button>
      </div>
    </div>
  );

  return (
    <div style={{marginTop:8}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid #DDD5C4",background:"#f8f8f8",
          color:"#aaa",fontSize:11,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{color:"#8C8880",letterSpacing:".3px"}}>· 已完成（{total}）</span>
        <span>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{marginTop:4,display:"flex",flexDirection:"column",gap:4}}>
          {doneTranslate.length>0&&(
            <>
              <GroupHeader icon="⟐" label="翻譯" color="#2A4060" line="#E8E2D2" count={doneTranslate.length}/>
              {doneTranslate.map(t=>(
                <TaskCard key={t.id} t={t} label="翻譯"
                  tc={t.color||"#2A4060"} tb={t.bg||"#E8E2D2"}
                  onUndo={()=>undoTask(t.id)} onDel={()=>delTask(t.id)}/>
              ))}
            </>
          )}
          {doneTeach.length>0&&(
            <>
              <GroupHeader icon="⊞" label="備課" color="#6B6558" line="#E8E0CC" count={doneTeach.length}/>
              {doneTeach.map(t=>(
                <TaskCard key={t.id} t={t} label="教材"
                  tc={t.color||"#6B6558"} tb={t.bg||"#E8E0CC"}
                  onUndo={()=>undoTask(t.id)} onDel={()=>delTask(t.id)}/>
              ))}
            </>
          )}
          {doneOther.length>0&&(
            <>
              <GroupHeader icon="◎" label="其他" color="#4A6080" line="#D5DFF0" count={doneOther.length}/>
              {doneTasks.filter(t=>t.type!=="translate"&&t.type!=="teach"&&t.type!=="material").map(t=>(
                <TaskCard key={t.id} t={t} label="其他"
                  tc={t.color||"#4A6080"} tb={t.bg||"#D5DFF0"}
                  onUndo={()=>undoTask(t.id)} onDel={()=>delTask(t.id)}/>
              ))}
              {doneFree.map(f=>(
                <TaskCard key={f.id} t={f} label="待辦"
                  tc="#4A6080" tb="#D5DFF0"
                  onUndo={()=>undoFree(f.id)} onDel={()=>delFree(f.id)}/>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

function MiniGanttRow({task:t,onInc,onDec,onDel,onAddTodo,onToggleTodo,onDelTodo}) {
  const [open,setOpen] = useState(false);
  const [input,setInput] = useState("");
  const d=t.deadline?daysUntil(t.deadline):null;
  const uc=d===null?"#4A6080":d<=3?"#c0392b":d<=7?"#e67e22":"#4E5E5C";
  const typeLabel=t.type==="translate"?"翻譯":t.type==="material"||t.type==="teach"?"備課":t.type==="other"?"其他":"待辦";
  const tc=t.color||(t.type==="translate"?"#2A4060":t.type==="teach"||t.type==="material"?"#6B6558":"#4A6080");
  const tb=t.bg||(t.type==="translate"?"#E8E2D2":t.type==="teach"||t.type==="material"?"#E8E0CC":"#D5DFF0");
  const todos=t.todos||[];
  const pendCount=todos.filter(x=>!x.done).length;
  const cbtn=(label,onClick,disabled)=>(
    <button onClick={onClick} disabled={disabled} style={{width:26,height:26,borderRadius:6,border:`1.5px solid ${disabled?"#e8e8e8":tc}`,background:disabled?"#f8f8f8":"#FDFAF5",color:disabled?"#ccc":tc,fontSize:14,fontWeight:700,cursor:disabled?"default":"pointer",fontFamily:"inherit",lineHeight:1,padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{label}</button>
  );
  return (
    <div style={{background:"#FDFAF5",borderRadius:8,padding:"9px 10px",marginBottom:5,borderLeft:`3px solid ${tc}`}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:(t.type==="teach"||t.type==="material")&&t.content?3:5}}>
        <span style={{...pill(tc,tb),flexShrink:0}}>{typeLabel}</span>
        <span style={{fontSize:11,fontWeight:700,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(t.type==="teach"||t.type==="material")?t.name.replace(/^教材：/,""):t.name}</span>
        <button onClick={()=>setOpen(o=>!o)}
          style={{fontSize:10,padding:"2px 7px",borderRadius:5,border:"1px solid #DDD5C4",background:open?"#D4DCED":"#FDFAF5",color:open?"#4E5E5C":"#aaa",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
          📋{todos.length>0?` ${pendCount}/${todos.length}`:""} {open?"▲":"▼"}
        </button>
      </div>
      {(t.type==="teach"||t.type==="material")&&t.content&&(
        <div style={{fontSize:10,color:tc,background:tb,padding:"2px 7px",borderRadius:4,marginBottom:5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.content}</div>
      )}
      {d!==null&&(
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
          <span style={{fontSize:10,color:uc,fontWeight:700}}>{d>0?`${d}天後`:d===0?"今天截止":`逾期${Math.abs(d)}天`}</span>
          <span style={{fontSize:9,color:"#bbb"}}>截止 {t.deadline}</span>
        </div>
      )}
      <div style={{display:"flex",gap:1,marginBottom:4}}>
        {Array.from({length:10},(_,i)=>(
          <div key={i} style={{flex:1,height:10,borderRadius:2,background:i<t.done?tc:"#DDD5C4",transition:"background .15s"}}/>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:9,color:"#aaa"}}>{t.done}/10　{Math.round(t.done*10)}%</span>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {cbtn("－",onDec,t.done<=0)}
          {cbtn("＋",onInc,t.done>=10)}
          <button onClick={onDel} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:12,padding:"0 2px",fontFamily:"inherit",lineHeight:1}}>✕</button>
        </div>
      </div>
      {/* 子任務展開區 */}
      {open&&(
        <div style={{marginTop:8,borderTop:"1px solid #f0f0f0",paddingTop:7}}>
          {todos.map(td=>(
            <div key={td.id} style={{display:"flex",alignItems:"center",gap:7,padding:"4px 0",borderBottom:"0.5px solid #f8f8f8"}}>
              <Chk done={td.done} onToggle={()=>onToggleTodo(t.id,td.id)}/>
              <span style={{flex:1,fontSize:11,color:td.done?"#bbb":"#333",textDecoration:"none"}}>{td.text}</span>
              <button onClick={()=>onDelTodo(t.id,td.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:11,padding:0}}>✕</button>
            </div>
          ))}
          {todos.length===0&&<div style={{fontSize:10,color:"#ccc",marginBottom:5}}>尚無子任務</div>}
          <div style={{display:"flex",gap:5,marginTop:5}}>
            <input value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&input.trim()&&(onAddTodo(t.id,input.trim()),setInput(""))}
              placeholder="新增子任務…"
              style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1.5px solid #DDD5C4",fontSize:11,fontFamily:"inherit",outline:"none"}}/>
            <button onClick={()=>input.trim()&&(onAddTodo(t.id,input.trim()),setInput(""))}
              style={{...btnS(),padding:"5px 10px",fontSize:11}}>+</button>
          </div>
        </div>
      )}
    </div>
  );
}

function CourseMiniCard({c,expanded,onClick,onEdit}) {
  const cc=CAT_COLOR[c.category]||"#333",cb=CAT_BG[c.category]||"#eee";
  return (
    <div style={{background:"#FDFAF5",borderRadius:9,padding:"8px 11px",marginBottom:4,borderLeft:`3px solid ${cc}`,outline:expanded?`1.5px solid ${cc}`:"none"}}>
      <div style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer"}} onClick={onClick}>
        <span style={{fontSize:12,fontWeight:700}}>{c.date}</span>
        <span style={{fontSize:10,color:"#888"}}>（{toWeek(c.date)}）{c.time}</span>
        <span style={pill(cc,cb)}>{CAT_LABEL[c.category]}</span>
        {c.fee&&<span style={{...pill(c.feePaid?"#1F2A44":"#7A6251", c.feePaid?"#D5DFF0":"#E8DABB"),marginLeft:"auto"}}>
          {c.feePaid?"✓ 已入帳":"· 待入帳"}
        </span>}
        {onEdit&&<button onClick={e=>{e.stopPropagation();onEdit();}} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:11,padding:"0 2px",marginLeft:c.fee?0:"auto",fontFamily:"inherit"}}>✎</button>}
      </div>
      <div style={{fontSize:10,color:"#555",marginTop:2}}>📍 {c.location}</div>
      {c.content&&<div style={{fontSize:10,color:cc,marginTop:1}}>{c.content}</div>}
    </div>
  );
}

function TransPanel({t,onClose,onEdit}) {
  const nameMatch = t.name.match(/^\[(.*?)\]\s*(.*)/);
  const publisher = nameMatch ? nameMatch[1] : "";
  const title     = nameMatch ? nameMatch[2] : t.name;
  return (
    <div style={{background:"#E8DABB",border:"1.5px solid #C6A75E",borderRadius:9,padding:"10px",marginBottom:6,marginTop:-3}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1F2A44",marginBottom:2}}>{title}</div>
          {publisher&&<div style={{fontSize:10,color:"#7A6251",letterSpacing:".5px",marginBottom:4}}>{publisher}</div>}
          {t.deadline&&<div style={{fontSize:10,color:"#8C8880"}}>◎ 截稿日：{t.deadline}</div>}
          {t.fee&&(
            <div style={{marginTop:6,padding:"8px 10px",background:"#EDE5D4",borderRadius:7,border:"1px solid #C6A75E"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,fontWeight:600,color:"#6B6558"}}>◈ 稿費</span>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:99,fontWeight:600,
                  background:t.feePaid?"#D5DFF0":"#E8DABB",
                  color:t.feePaid?"#1F2A44":"#7A6251"}}>
                  {t.feePaid?"✓ 已入帳":"· 待入帳"}
                </span>
              </div>
              <div style={{fontSize:11,color:"#1F2A44"}}>金額：<strong>{t.fee}</strong></div>
              {t.feeBank&&<div style={{fontSize:10,color:"#8C8880",marginTop:2}}>匯入：{t.feeBank}</div>}
              {t.feeDate&&<div style={{fontSize:10,color:"#8C8880",marginTop:1}}>預計入帳：{t.feeDate}</div>}
            </div>
          )}
          {!t.deadline&&!t.fee&&<div style={{fontSize:10,color:"#C4BDB5"}}>無額外資訊</div>}
        </div>
        <div style={{display:"flex",gap:4,alignSelf:"flex-start",flexShrink:0,marginLeft:8}}>
          {onEdit&&<button onClick={onEdit} style={{padding:"2px 7px",borderRadius:5,border:"1px solid #C6A75E",background:"#EDE5D4",color:"#6B6558",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>編輯</button>}
          <button onClick={onClose} style={{padding:"2px 7px",borderRadius:5,border:"1px solid #C6A75E",background:"#EDE5D4",color:"#8A9BB5",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
        </div>
      </div>
    </div>
  );
}

function CoursePanel({c,onClose,onEdit,onMarkPaid}) {
  const cc="#1F2A44";
  const cb="#D5DFF0";
  return (
    <div style={{background:cb,border:`1.5px solid ${cc}44`,borderRadius:9,padding:"10px",marginBottom:6,marginTop:-3}}>
      {/* 標題列：日期＋編輯＋關閉 */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:6}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
            <span style={{fontSize:13,fontWeight:700,color:"#1F2A44"}}>{c.date}</span>
            <span style={{fontSize:11,color:"#8C8880"}}>（{toWeek(c.date)}）{c.time}</span>
            <span style={{...pill(cc,cb),border:`1px solid ${cc}55`}}>{CAT_LABEL[c.category]}</span>
          </div>
          <div style={{fontSize:11,color:"#6B6558",marginBottom:c.content?3:0}}>📍 {c.location}</div>
          {c.content&&<div style={{fontSize:11,color:cc,marginBottom:3,lineHeight:1.5}}>{c.content}</div>}
          {c.assistants?.length>0&&<div style={{fontSize:11,color:"#6B6558",marginBottom:3}}>· 助教：{c.assistants.join("、")}</div>}
          {c.slideUrl&&<a href={c.slideUrl} target="_blank" rel="noreferrer" style={{fontSize:11,color:cc,display:"block",marginBottom:3}}>⟐ 簡報連結</a>}
          {c.note&&<div style={{fontSize:11,color:"#8C8880",marginBottom:3}}>· {c.note}</div>}
          {c.fee&&(
            <div style={{marginTop:6,padding:"8px 10px",background:"#EDE5D4",borderRadius:7,border:`1px solid ${cc}33`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,fontWeight:600,color:"#6B6558"}}>◈ 講師費</span>
                <button onClick={onMarkPaid} style={{fontSize:10,padding:"2px 8px",borderRadius:99,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:600,
                  background:c.feePaid?"#D5DFF0":"#E8DABB",
                  color:c.feePaid?"#1F2A44":"#7A6251"}}>
                  {c.feePaid?"✓ 已入帳":"· 標記入帳"}
                </button>
              </div>
              <div style={{fontSize:11,color:"#1F2A44"}}>金額：<strong>{c.fee}</strong></div>
              {c.feeBank&&<div style={{fontSize:10,color:"#8C8880",marginTop:2}}>匯入：{c.feeBank}</div>}
              {c.feeDate&&<div style={{fontSize:10,color:"#8C8880",marginTop:1}}>預計入帳：{c.feeDate}</div>}
              {c.feePaidDate&&<div style={{fontSize:10,color:"#4A6080",marginTop:1,fontWeight:600}}>✓ 實際入帳：{c.feePaidDate}</div>}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:4,alignSelf:"flex-start",flexShrink:0,marginLeft:8}}>
          {onEdit&&<button onClick={onEdit} style={{padding:"2px 7px",borderRadius:5,border:`1px solid ${cc}44`,background:"#EDE5D4",color:"#6B6558",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>✎</button>}
          <button onClick={onClose} style={{padding:"2px 7px",borderRadius:5,border:`1px solid ${cc}44`,background:"#EDE5D4",color:"#8A9BB5",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
        </div>
      </div>
    </div>
  );
}

function Chk({done,onToggle}) {
  return (
    <div onClick={onToggle} style={{width:15,height:15,borderRadius:3,border:done?"none":"1.5px solid #ccc",background:done?"#1F2A44":"#fff",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
      {done&&<span style={{color:"#fff",fontSize:9}}>✓</span>}
    </div>
  );
}
function OvBox({children,onClick}){return <div onMouseDown={e=>{if(e.target===e.currentTarget)onClick();}} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>{children}</div>;}
function Fld({label,required,children}){return <div style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:3}}>{label}{required&&<span style={{color:"#e74c3c"}}> *</span>}</div>{children}</div>;}
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
